summary: >-
  Palaces that once hosted maharajas now host vows. Udaipur's lake-side
  City Palace, Jaipur's hilltop forts above the Pink City, Jodhpur's marble
  havelis lit by a thousand lamps — India composes celebrations in genuine
  ceremony, color, and centuries of craft.
detail: >-
  We bring couples into the same circles that opened estates in Bali and
  Cape Town — palace hotels on Lake Pichola, private forts above Jaipur, and
  desert encampments beneath Jaisalmer's walls. Multi-day celebrations,
  classical processions, and artisans whose families have served Rajasthan's
  royal houses for generations.
