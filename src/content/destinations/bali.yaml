summary: >-
  Our home and our heartland. Thirty-four years of insider relationships open doors
  that no itinerary can — cliff-edge estates above Uluwatu, private-pool villas
  folded into the rice terraces, ceremonies held in the gold of the late
  afternoon.
detail: >-
  In Bali we are not visitors. We know the families behind the finest estates,
  the artisans who can be trusted with the irreplaceable, and the quiet
  logistics that turn a far-flung island into an effortless welcome for your
  guests.
