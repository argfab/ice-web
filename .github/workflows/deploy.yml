name: Deploy site

on:
  push:
    branches: [main]
  workflow_dispatch:

# OIDC: request a short-lived token to assume the SCOPED web-deploy role.
# No static AWS keys. The role can only write the site bucket + invalidate
# CloudFront — it has no access to the backend (Lambda/DynamoDB/IAM/SES/infra).
permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-web
  cancel-in-progress: false

jobs:
  deploy:
    # Opt-in: set the repo Actions variable DEPLOY_ENABLED=true once the role
    # and SITE_BUCKET / CF_DIST_ID / AWS_WEB_DEPLOY_ROLE_ARN variables are set.
    if: vars.DEPLOY_ENABLED == 'true'
    runs-on: ubuntu-latest
    env:
      AWS_REGION: us-east-1
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_WEB_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync site to S3
        run: |
          # Hashed, immutable assets — long cache. HTML excluded here.
          aws s3 sync dist "s3://${{ vars.SITE_BUCKET }}" \
            --delete --exclude "*.html" \
            --cache-control "public,max-age=31536000,immutable"
          # HTML — always revalidate.
          aws s3 sync dist "s3://${{ vars.SITE_BUCKET }}" \
            --delete --exclude "*" --include "*.html" \
            --cache-control "public,max-age=0,must-revalidate"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ vars.CF_DIST_ID }}" --paths "/*"

      - name: Summary
        run: echo "Deployed ICE front-end → live site" >> "$GITHUB_STEP_SUMMARY"
